name: Deploy to AWS EC2

on:
  push:
    branches: [main]

env:
  VM_USER: ubuntu
  VM_IP: ${{ secrets.AWS_EC2_IP }}
  DEPLOY_PATH: /home/ubuntu/whatsapp-automation

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ env.VM_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync code to EC2
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.env' \
            --exclude='deploy/.env' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='frontend/.angular' \
            --exclude='docs' \
            --exclude='.claude' \
            --exclude='coverage' \
            --exclude='MobaXterm_Portable_v25.3' \
            -e "ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no" \
            ./ ${{ env.VM_USER }}@${{ env.VM_IP }}:${{ env.DEPLOY_PATH }}/

      - name: Build and deploy
        run: |
          ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no \
            ${{ env.VM_USER }}@${{ env.VM_IP }} << 'DEPLOY_SCRIPT'

          set -e
          cd /home/ubuntu/whatsapp-automation

          echo "=== Building images ==="
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env build --no-cache

          echo "=== Stopping old containers ==="
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env down --timeout 30

          echo "=== Starting database and redis ==="
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d postgres redis

          echo "=== Waiting for PostgreSQL ==="
          for i in $(seq 1 15); do
            if docker exec wa-postgres pg_isready -U postgres > /dev/null 2>&1; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting for PostgreSQL... attempt $i/15"
            sleep 3
          done

          echo "=== Starting backend ==="
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d backend

          echo "=== Waiting for backend health ==="
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/health/liveness > /dev/null 2>&1; then
              echo "Backend is healthy!"
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "ERROR: Backend failed to start. Logs:"
              docker compose -f deploy/docker-compose.yml --env-file deploy/.env logs --tail=30 backend
              exit 1
            fi
            echo "Waiting for backend... attempt $i/20"
            sleep 5
          done

          echo "=== Starting frontend ==="
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d frontend

          sleep 5

          echo "=== Service status ==="
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env ps

          echo "=== Cleaning up old images ==="
          docker image prune -f
          docker builder prune -f --keep-storage 500MB 2>/dev/null || true

          echo "=== Deployment complete ==="
          DEPLOY_SCRIPT

      - name: Verify deployment
        run: |
          sleep 10
          STATUS=$(ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no \
            ${{ env.VM_USER }}@${{ env.VM_IP }} \
            "curl -sf -o /dev/null -w '%{http_code}' http://localhost:3000/health/liveness || echo 'failed'")
          if [ "$STATUS" = "200" ]; then
            echo "Deployment verified successfully!"
          else
            echo "WARNING: Health check returned: $STATUS"
            ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no \
              ${{ env.VM_USER }}@${{ env.VM_IP }} \
              "cd /home/ubuntu/whatsapp-automation && docker compose -f deploy/docker-compose.yml --env-file deploy/.env logs --tail=50"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/ec2_key
