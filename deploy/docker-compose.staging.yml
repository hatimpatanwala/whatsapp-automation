# ─── STAGING / TEST Docker Compose (isolated from production) ──────────────
# A second, fully-isolated stack that can run on the SAME EC2 box as prod
# WITHOUT touching it. Everything is namespaced/offset so there is zero overlap
# with the production stack in deploy/docker-compose.yml:
#
#                     PRODUCTION                 STAGING (this file)
#   project name      (deploy)                   wa-staging
#   containers        wa-postgres ...            wa-staging-postgres ...
#   postgres port     127.0.0.1:5432             127.0.0.1:5433
#   redis port        127.0.0.1:6379             127.0.0.1:6380
#   backend port      127.0.0.1:3000             127.0.0.1:3001
#   frontend port     8080                       8081
#   volumes           deploy_pgdata / redisdata  wa-staging_pgdata-staging / ...
#   network           wa-network                 wa-staging-network
#
# Usage (run ON the server, prod keeps running untouched):
#   docker compose -p wa-staging -f deploy/docker-compose.staging.yml \
#     --env-file deploy/.env.staging up -d --build
#
# ⚠️  RESOURCES: prod is tuned for a 1 GB box and already uses ~1 GB. Running this
#     second stack needs MORE RAM (≥2 GB free; t3.medium / 4 GB recommended) or it
#     will compete with prod and risk OOM-killing production containers. Prefer a
#     separate/bigger instance, or stop non-essential prod load first.
# ───────────────────────────────────────────────────────────────────────────
name: wa-staging

services:
  # ─── PostgreSQL (separate instance + volume — prod DB is never touched) ───
  postgres:
    image: postgres:16-alpine
    container_name: wa-staging-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-whatsapp_commerce_staging}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata-staging:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres
        -c shared_buffers=96MB
        -c effective_cache_size=192MB
        -c work_mem=4MB
        -c maintenance_work_mem=48MB
        -c max_connections=20
        -c wal_buffers=4MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
    networks:
      - wa-staging-network
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: "0.5"

  # ─── Redis (separate instance + volume) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wa-staging-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    command: >
      redis-server
        --maxmemory 48mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --save 60 1000
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redisdata-staging:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:?REDIS_PASSWORD is required}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wa-staging-network
    deploy:
      resources:
        limits:
          memory: 80M
          cpus: "0.25"

  # ─── Backend (NestJS API) ────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    image: wa-staging-backend
    container_name: wa-staging-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api

      # Database — points at the STAGING postgres container
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:-whatsapp_commerce_staging}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_SYNCHRONIZE: "false"

      # Redis — STAGING redis container
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      QUEUE_REDIS_HOST: redis
      QUEUE_REDIS_PORT: 6379
      QUEUE_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}

      # Session
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      SESSION_TTL: ${SESSION_TTL:-86400}

      # CORS — staging frontend origin
      CORS_ORIGIN: ${CORS_ORIGIN:-}

      # OAuth / social login (point callbacks at the STAGING URLs)
      OAUTH_CALLBACK_BASE_URL: ${OAUTH_CALLBACK_BASE_URL:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      # WhatsApp Cloud API
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v21.0}
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-https://graph.facebook.com}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_RATE_LIMIT_MAX: ${WHATSAPP_RATE_LIMIT_MAX:-70}
      WHATSAPP_RATE_LIMIT_DURATION: ${WHATSAPP_RATE_LIMIT_DURATION:-1000}

      # Meta Platform
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      META_EMBEDDED_SIGNUP_CONFIG_ID: ${META_EMBEDDED_SIGNUP_CONFIG_ID:-}
      META_GRAPH_API_VERSION: ${META_GRAPH_API_VERSION:-v21.0}
      META_SYSTEM_USER_ID: ${META_SYSTEM_USER_ID}
      META_SYSTEM_USER_TOKEN: ${META_SYSTEM_USER_TOKEN}

      # Token Encryption — MUST match prod so cloned super-admin rows + any
      # encrypted values decrypt correctly.
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?TOKEN_ENCRYPTION_KEY is required}

      # AWS S3 / CDN
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-whatsapp-commerce-media}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN:-}

      # Razorpay
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}

      RESERVATION_TTL_MINUTES: ${RESERVATION_TTL_MINUTES:-15}

      # Admin Seed — used only if no super_admins exist; the clone script imports
      # the real ones from prod, so this is just a fallback.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@wacommerce.in}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      ADMIN_NAME: ${ADMIN_NAME:-Staging Admin}

      # SMTP / Email
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@whatsappdemo.duckdns.org}

      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wa-staging-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ─── Frontend (Angular + Nginx) ──────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    image: wa-staging-frontend
    container_name: wa-staging-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - wa-staging-network
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

volumes:
  pgdata-staging:
    driver: local
  redisdata-staging:
    driver: local

networks:
  wa-staging-network:
    driver: bridge
