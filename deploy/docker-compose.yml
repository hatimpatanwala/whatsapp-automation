# ─── Production Docker Compose (AWS EC2) ──────────────────────────────
# Full stack: Frontend (Nginx) + Backend (NestJS) + PostgreSQL + Redis
# Usage: docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d
# ───────────────────────────────────────────────────────────────────────

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wa-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-whatsapp_commerce}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./../.docker/scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Tuned for t3.micro (1GB RAM) — conservative memory usage
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=256MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c max_connections=30
        -c wal_buffers=4MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
    networks:
      - wa-network
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"

  # ─── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wa-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
        --maxmemory 64mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --save 60 1000
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:?REDIS_PASSWORD is required}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wa-network
    deploy:
      resources:
        limits:
          memory: 96M
          cpus: "0.25"

  # ─── Backend (NestJS API) ──────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: wa-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api

      # Database — connects to postgres container
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:-whatsapp_commerce}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_SYNCHRONIZE: "false"

      # Redis — connects to redis container
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}

      # Queue Redis (same redis instance)
      QUEUE_REDIS_HOST: redis
      QUEUE_REDIS_PORT: 6379
      QUEUE_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}

      # Session
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      SESSION_TTL: ${SESSION_TTL:-86400}

      # CORS — frontend serves via nginx on port 80
      CORS_ORIGIN: ${CORS_ORIGIN:-}

      # WhatsApp Cloud API
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v21.0}
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-https://graph.facebook.com}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_RATE_LIMIT_MAX: ${WHATSAPP_RATE_LIMIT_MAX:-70}
      WHATSAPP_RATE_LIMIT_DURATION: ${WHATSAPP_RATE_LIMIT_DURATION:-1000}

      # Meta Platform
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      META_EMBEDDED_SIGNUP_CONFIG_ID: ${META_EMBEDDED_SIGNUP_CONFIG_ID:-}
      META_GRAPH_API_VERSION: ${META_GRAPH_API_VERSION:-v21.0}
      META_SYSTEM_USER_ID: ${META_SYSTEM_USER_ID}
      META_SYSTEM_USER_TOKEN: ${META_SYSTEM_USER_TOKEN}

      # Token Encryption
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?TOKEN_ENCRYPTION_KEY is required}

      # AWS S3 / CDN
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-whatsapp-commerce-media}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN:-}

      # Razorpay
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}

      # Inventory
      RESERVATION_TTL_MINUTES: ${RESERVATION_TTL_MINUTES:-15}

      # Admin Seed
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@wacommerce.in}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      ADMIN_NAME: ${ADMIN_NAME:-Platform Admin}

      # SMTP / Email
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@whatsappdemo.duckdns.org}

      # Observability (optional)
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wa-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ─── Frontend (Angular + Nginx reverse proxy) ──────────────────────
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: wa-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - wa-network
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  wa-network:
    driver: bridge
