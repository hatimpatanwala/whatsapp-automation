# ─── Nginx: Angular SPA + NestJS API Reverse Proxy ───────────────────
# Serves Angular static files and proxies /api/* to backend:3000
# ───────────────────────────────────────────────────────────────────────

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=100r/s;

# Upstream backend with keepalive connections
upstream backend_api {
    server backend:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip compression ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        image/svg+xml;

    # ── Client body size (for media uploads proxied through nginx) ───
    client_max_body_size 25m;

    # ── Static assets — aggressive cache (Angular hashed filenames) ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Angular SPA — all frontend routes fall back to index.html ────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Webhook endpoint — higher rate limit for Meta callbacks ──────
    # Must come BEFORE the general /api/ block (nginx matches longest prefix)
    location /api/whatsapp/webhook {
        limit_req zone=webhook_limit burst=50 nodelay;

        proxy_pass http://backend_api/api/whatsapp/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── API reverse proxy ────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }

    # ── Health endpoints (no /api prefix — NestJS excludes from prefix)
    location ~ ^/health(/.*)?$ {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Block dotfiles ────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
